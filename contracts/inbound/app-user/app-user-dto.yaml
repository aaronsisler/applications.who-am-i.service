openapi: "3.1.0"
info:
  title: App User Dto
  version: "1.0"
servers:
  - url: http://localhost:8080
components:
  schemas:
    AppUserDto:
      title: AppUserDto
      type: object
      allOf:
        - $ref: '../common.yaml#/components/schemas/BaseDto'
      description: App user returned to clients
      required:
        - emailAddress
        - firstName
        - lastName
      properties:
        emailAddress:
          type: string
          format: email
          example: "johnny.appleseed@gmail.com"
        firstName:
          type: string
          example: "Johnny"
        lastName:
          type: string
          example: "Appleseed"
