openapi: "3.1.0"
info:
  title: Common Schemas
  version: "1.0"
servers:
  - url: http://localhost:8080
paths: { }
components:
  schemas:
    BaseDto:
      title: BaseDto
      type: object
      required:
        - externalId
        - createdAt
        - updatedAt
      properties:
        externalId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        createdAt:
          type: string
          format: date-time
          example: '2023-01-02T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2023-01-02T12:00:00Z'
    ErrorCode:
      title: ErrorCode
      type: string
      enum:
        - EMAIL_ALREADY_EXISTS
        - EMAIL_FORMAT_INVALID
        - INTERNAL_SERVER_ERROR
        - MALFORMED_JSON
        - METHOD_NOT_ALLOWED
        - NOT_FOUND
        - NOT_NULL
        - NOT_BLANK
        - REQUIRED
        - SIZE
        - UNSUPPORTED_MEDIA_TYPE
      example: EMAIL_ALREADY_EXISTS
    ErrorDetail:
      title: ErrorDetail
      type: object
      required:
        - code
        - message
      properties:
        field:
          type: string
          example: "emailAddress"
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
          example: "Email address must not be null"
    ErrorDto:
      title: ErrorDto
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ErrorDetail'