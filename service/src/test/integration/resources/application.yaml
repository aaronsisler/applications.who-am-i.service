management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  info:
    env:
      enabled: true
# Used to disable logging during test run
logging:
  level:
    root: OFF
    org:
      springframework: OFF
springdoc:
  api-docs:
    # Disable Swagger API docs generation during tests
    enabled: false
# Everything above these dashes will be applied to all profiles
---
